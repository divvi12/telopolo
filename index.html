<body>
  <div id="root"></div>

  <script>
    // Load expanded word packs from JSON files
    async function loadExpandedWords() {
      const files = [
        { file: 'worldwide-words-expanded.json', key: 'worldwide' },
        { file: 'usa-words-expanded.json', key: 'usa' },
        { file: 'south-africa-words-expanded.json', key: 'southAfrica' },
        { file: 'uk-words-expanded.json', key: 'uk' },
        { file: 'australia-words-expanded.json', key: 'australia' },
        { file: 'ireland-words-expanded.json', key: 'ireland' },
        { file: 'canada-words-expanded.json', key: 'canada' }
      ];
      await Promise.all(files.map(async ({ file, key }) => {
        try {
          const response = await fetch(file);
          if (response.ok) {
            const data = await response.json();
            if (data[key]) {
              wordPacks[key] = data[key];
            }
          }
        } catch (e) {
          console.log(`Using default ${key} words`);
        }
      }));
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Language helper
    const LANG_KEY = 'telopo_language';
    const getSavedLang = () => { try { return localStorage.getItem(LANG_KEY) || 'en'; } catch { return 'en'; } };
    const saveLang = (lang) => { try { localStorage.setItem(LANG_KEY, lang); } catch {} };

    const ageEmojis = {
      kids: "🧒", tweens: "🎮", teens: "📱", adults: "💼", over40: "🍷", allAges: "👨‍👩‍👧‍👦"
    };

    const roundIcons = { 1: "🗣️", 2: "☝️", 3: "🎭" };
    const roundColors = {
      1: "from-blue-500 to-blue-700",
      2: "from-amber-500 to-orange-600",
      3: "from-purple-500 to-pink-600"
    };

    const teamColors = [
      { bg: "bg-blue-600/30", ring: "ring-blue-400", text: "text-blue-300", gradient: "from-blue-600 to-blue-800" },
      { bg: "bg-red-600/30", ring: "ring-red-400", text: "text-red-300", gradient: "from-red-600 to-red-800" },
      { bg: "bg-green-600/30", ring: "ring-green-400", text: "text-green-300", gradient: "from-green-600 to-green-800" },
      { bg: "bg-yellow-600/30", ring: "ring-yellow-400", text: "text-yellow-300", gradient: "from-yellow-500 to-amber-700" },
      { bg: "bg-pink-600/30", ring: "ring-pink-400", text: "text-pink-300", gradient: "from-pink-500 to-pink-700" },
      { bg: "bg-cyan-600/30", ring: "ring-cyan-400", text: "text-cyan-300", gradient: "from-cyan-500 to-cyan-700" },
    ];
    const teamEmojis = ["🔵", "🔴", "🟢", "🟡", "🩷", "🩵"];
    const cardBaseOptions = [21, 31, 41, 51];
    function shuffleArray(arr) { const s = [...arr]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; }
    function getOddCardCount(base, numTeams) { return (base * 3) % numTeams === 0 ? base + 1 : base; }

    // Helper functions for word history (persisted across 5 games per country/age combo)
    // Clean up the old word-history storage if it lingers from a previous version
    try { localStorage.removeItem('telopo_word_history'); } catch {}

    // Custom ("Your Words") pack: user-typed words, kept only for this tab session.
    // Uses sessionStorage so an accidental reload won't lose them, but they clear when the tab closes.
    const CUSTOM_KEY = 'telopo_custom_words';
    const getCustomWords = () => { try { return JSON.parse(sessionStorage.getItem(CUSTOM_KEY)) || []; } catch { return []; } };
    const saveCustomWords = (words) => { try { sessionStorage.setItem(CUSTOM_KEY, JSON.stringify(words)); } catch {} };
    // Register the custom pack so it appears alongside the country packs
    if (typeof wordPacks !== 'undefined' && !wordPacks.custom) {
      wordPacks.custom = { name: 'Your Words', flag: '✏️', custom: true, ages: { allAges: [] } };
    }

    // Full game-state recovery: survive an accidental reload or iOS Safari tab eviction.
    // Uses localStorage (sessionStorage gets wiped when iOS evicts a backgrounded tab) with a TTL.
    const GAME_KEY = 'telopo_game_state';
    const GAME_TTL_MS = 30 * 60 * 1000; // expire stale games after 30 minutes of inactivity
    const clearSavedGame = () => { try { localStorage.removeItem(GAME_KEY); } catch {} };
    const loadSavedGame = () => {
      try {
        const s = JSON.parse(localStorage.getItem(GAME_KEY));
        if (!s || !s.gameState || s.gameState === 'setup') return null;
        if (s.savedAt && (Date.now() - s.savedAt) > GAME_TTL_MS) { clearSavedGame(); return null; }
        // If reloaded mid-turn, the live timer can't fairly resume — abort that one turn:
        // return its words to the pile, no score change, team replays from GO.
        if (s.isRunning) {
          s.remainingWords = [...(s.remainingWords || []), ...(s.turnCorrect || []), ...(s.currentWord ? [s.currentWord] : [])];
          s.turnCorrect = [];
          s.currentWord = null;
          s.isRunning = false;
          s.showTurnSummary = false;
          s.timer = 30;
        }
        return s;
      } catch { return null; }
    };

    function App() {
      const [lang, setLang] = useState(getSavedLang());
      const t = translations[lang] || translations.en;
      const changeLang = (newLang) => { setLang(newLang); saveLang(newLang); };

      const [savedGame] = useState(loadSavedGame);
      const g = (k, d) => (savedGame && savedGame[k] !== undefined) ? savedGame[k] : d;

      const [gameState, setGameState] = useState(g('gameState', 'setup'));
      const [selectedCountry, setSelectedCountry] = useState(() => savedGame ? savedGame.selectedCountry : (getCustomWords().length > 0 ? 'custom' : 'worldwide'));
      const [ageGroup, setAgeGroup] = useState(g('ageGroup', 'allAges'));
      const [customWords, setCustomWords] = useState(() => getCustomWords());
      const [wordInput, setWordInput] = useState('');
      const [customNotice, setCustomNotice] = useState('');
      const [round, setRound] = useState(g('round', 1));
      const [roundStartTeam, setRoundStartTeam] = useState(g('roundStartTeam', 0));
      const [timer, setTimer] = useState(g('timer', 30));
      const [isRunning, setIsRunning] = useState(g('isRunning', false));
      const [numTeams, setNumTeams] = useState(g('numTeams', 2));
      const [currentTeam, setCurrentTeam] = useState(g('currentTeam', 0));
      const [numCards, setNumCards] = useState(g('numCards', 21));
      const [gameWords, setGameWords] = useState(g('gameWords', []));
      const [remainingWords, setRemainingWords] = useState(g('remainingWords', []));
      const [currentWord, setCurrentWord] = useState(g('currentWord', null));
      const [scores, setScores] = useState(g('scores', []));
      const [turnCorrect, setTurnCorrect] = useState(g('turnCorrect', []));
      const [showTurnSummary, setShowTurnSummary] = useState(g('showTurnSummary', false));
      const [showRules, setShowRules] = useState(false);
      const [showLangMenu, setShowLangMenu] = useState(false);

      // Refs to track current values for timer callback
      const currentWordRef = useRef(null);
      const turnCorrectRef = useRef([]);
      const turnEndedRef = useRef(false);
      const lastTopicCountryRef = useRef(selectedCountry !== 'custom' ? selectedCountry : 'worldwide');

      // Keep refs in sync with state
      useEffect(() => { currentWordRef.current = currentWord; }, [currentWord]);
      useEffect(() => { turnCorrectRef.current = turnCorrect; }, [turnCorrect]);

      const langOptions = Object.keys(translations);

      useEffect(() => { setCustomNotice(''); }, [selectedCountry]);

      // Persist active game so an accidental reload or iOS tab eviction can recover it; cleared on return to setup.
      useEffect(() => {
        if (gameState === 'setup') { clearSavedGame(); return; }
        try {
          localStorage.setItem(GAME_KEY, JSON.stringify({
            gameState, selectedCountry, ageGroup, round, roundStartTeam, numTeams,
            currentTeam, numCards, gameWords, remainingWords, currentWord, scores,
            turnCorrect, showTurnSummary, timer, isRunning, savedAt: Date.now()
          }));
        } catch {}
      }, [gameState, selectedCountry, ageGroup, round, roundStartTeam, numTeams, currentTeam, numCards, gameWords, remainingWords, currentWord, scores, turnCorrect, showTurnSummary, timer, isRunning]);

      useEffect(() => {
        let interval;
        if (isRunning && timer > 0) interval = setInterval(() => setTimer(prev => prev - 1), 1000);
        else if (timer === 0 && isRunning) endTurn();
        return () => clearInterval(interval);
      }, [isRunning, timer]);

      useEffect(() => {
        const adjusted = cardBaseOptions.map(b => getOddCardCount(b, numTeams));
        if (!adjusted.includes(numCards)) setNumCards(adjusted[0]);
      }, [numTeams]);

      const getCardOptions = () => cardBaseOptions.map(b => getOddCardCount(b, numTeams));
      const addCustomWord = () => {
        const w = wordInput.trim();
        if (!w) return;
        if (customWords.some(x => x.toLowerCase() === w.toLowerCase())) {
          setCustomNotice('Already in the pot — try a different one');
          setWordInput('');
          return;
        }
        const next = [...customWords, w];
        setCustomWords(next);
        saveCustomWords(next);
        setCustomNotice('');
        setWordInput('');
      };
      const startGame = () => {
        const isCustom = selectedCountry === 'custom';
        let pool;
        if (isCustom) {
          if (customWords.length < 2) return;
          pool = customWords;
        } else {
          pool = wordPacks[selectedCountry].ages[ageGroup];
        }
        // Remove duplicates (case-insensitive, keep first) so the same word can never appear twice in one game
        const seen = new Set();
        const uniquePool = [];
        for (const w of pool) {
          const k = (w || '').trim().toLowerCase();
          if (k && !seen.has(k)) { seen.add(k); uniquePool.push(w); }
        }
        const cardsThisGame = isCustom ? uniquePool.length : Math.min(numCards, uniquePool.length);
        if (cardsThisGame < 2) return;
        const selected = shuffleArray(uniquePool).slice(0, cardsThisGame);
        const randomStartTeam = Math.floor(Math.random() * numTeams);
        setGameWords(selected);
        setRemainingWords(shuffleArray([...selected]));
        setScores(Array(numTeams).fill(0));
        setRound(1);
        setRoundStartTeam(randomStartTeam);
        setCurrentTeam(randomStartTeam);
        setGameState('playing');
      };
      const startTurn = () => { turnEndedRef.current = false; turnCorrectRef.current = []; setTurnCorrect([]); setTimer(30); setIsRunning(true); setShowTurnSummary(false); drawNextWord(); };
      const drawNextWord = () => { if (remainingWords.length > 0) { const [next, ...rest] = remainingWords; currentWordRef.current = next; setCurrentWord(next); setRemainingWords(rest); } else { currentWordRef.current = null; endRound(); } };
      const markCorrect = () => { if (turnEndedRef.current || !currentWord) return; const newTurnCorrect = [...turnCorrect, currentWord]; turnCorrectRef.current = newTurnCorrect; setTurnCorrect(newTurnCorrect); if (remainingWords.length > 0) drawNextWord(); else { currentWordRef.current = null; endRoundWithCorrect(newTurnCorrect); } };
      const stopTurn = () => { endTurn(); };
      const endTurn = () => {
        if (turnEndedRef.current) return;
        turnEndedRef.current = true;
        const wordToReturn = currentWordRef.current;
        const correctWords = turnCorrectRef.current;
        currentWordRef.current = null;
        if (wordToReturn) setRemainingWords(prev => [...prev, wordToReturn]);
        setIsRunning(false);
        setCurrentWord(null);
        setScores(prev => { const n = [...prev]; n[currentTeam] += correctWords.length; return n; });
        setShowTurnSummary(true);
      };
      const endRoundWithCorrect = (correctList) => { turnEndedRef.current = true; currentWordRef.current = null; setIsRunning(false); setCurrentWord(null); setScores(prev => { const n = [...prev]; n[currentTeam] += correctList.length; return n; }); setTurnCorrect(correctList); if (round < 3) setGameState('between-rounds'); else setGameState('finished'); };
      const endRound = () => endRoundWithCorrect(turnCorrect);
      const nextTeam = () => { setShowTurnSummary(false); setTurnCorrect([]); setCurrentTeam((currentTeam + 1) % numTeams); };
      const nextRound = () => {
        const minScore = Math.min(...scores);
        const lowestTeams = scores.reduce((acc, s, i) => { if (s === minScore) acc.push(i); return acc; }, []);
        const newStartTeam = lowestTeams[Math.floor(Math.random() * lowestTeams.length)];
        setRound(prev => prev + 1); setRemainingWords(shuffleArray([...gameWords])); setRoundStartTeam(newStartTeam); setCurrentTeam(newStartTeam); setTurnCorrect([]); setShowTurnSummary(false); setCurrentWord(null); setIsRunning(false); setTimer(30); setGameState('playing');
      };
      const resetGame = () => { setGameState('setup'); setRound(1); setRoundStartTeam(0); setTimer(30); setIsRunning(false); setCurrentTeam(0); setScores([]); setGameWords([]); setRemainingWords([]); setCurrentWord(null); setTurnCorrect([]); setShowTurnSummary(false); setAgeGroup('allAges'); setCustomWords([]); saveCustomWords([]); setWordInput(''); setCustomNotice(''); };
      const getWinner = () => { const max = Math.max(...scores); return scores.reduce((acc, s, i) => { if (s === max) acc.push(i); return acc; }, []); };
      const getLeader = () => { const max = Math.max(...scores); const leaders = scores.reduce((acc, s, i) => { if (s === max) acc.push(i); return acc; }, []); return leaders.length === scores.length ? null : leaders; };

      const RulesModal = () => (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={() => setShowRules(false)}>
          <div className="bg-gray-800 rounded-3xl p-6 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-2xl font-black text-white">📜 {t.rulesTitle}</h2>
              <button onClick={() => setShowRules(false)} className="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div className="space-y-4">
              <div className="bg-gray-700/50 rounded-xl p-4">
                <h3 className="text-yellow-400 font-bold mb-2">⏱️ {t.timeLimit}</h3>
                <p className="text-gray-300" dangerouslySetInnerHTML={{__html: t.timeLimitDesc}}></p>
              </div>
              <div className="bg-blue-900/40 rounded-xl p-4 border-l-4 border-blue-400">
                <h3 className="text-blue-400 font-bold mb-2">🗣️ {t.round1Title}</h3>
                <ul className="text-gray-300 space-y-1 text-sm">
                  {t.round1Rules.map((rule, i) => <li key={i} className={i >= 2 ? 'text-red-400' : ''}>{i < 2 ? '✓' : '✗'} {rule}</li>)}
                </ul>
              </div>
              <div className="bg-amber-900/40 rounded-xl p-4 border-l-4 border-amber-400">
                <h3 className="text-amber-400 font-bold mb-2">☝️ {t.round2Title}</h3>
                <ul className="text-gray-300 space-y-1 text-sm">
                  {t.round2Rules.map((rule, i) => <li key={i} className={i >= 1 ? 'text-red-400' : ''} dangerouslySetInnerHTML={{__html: (i < 1 ? '✓ ' : '✗ ') + rule}}></li>)}
                </ul>
              </div>
              <div className="bg-purple-900/40 rounded-xl p-4 border-l-4 border-purple-400">
                <h3 className="text-purple-400 font-bold mb-2">🎭 {t.round3Title}</h3>
                <ul className="text-gray-300 space-y-1 text-sm">
                  {t.round3Rules.map((rule, i) => <li key={i} className={i >= 2 ? 'text-red-400' : ''}>{i < 2 ? '✓' : '✗'} {rule}</li>)}
                </ul>
              </div>
              <div className="bg-red-900/40 rounded-xl p-4">
                <h3 className="text-red-400 font-bold mb-2">⚠️ {t.ruleBreaks}</h3>
                <p className="text-gray-300 text-sm" dangerouslySetInnerHTML={{__html: t.ruleBreaksDesc}}></p>
              </div>
              <div className="bg-gray-700/50 rounded-xl p-4">
                <h3 className="text-green-400 font-bold mb-2">✓ {t.claimingPoints}</h3>
                <ul className="text-gray-300 space-y-1 text-sm">
                  {t.claimingPointsRules.map((rule, i) => <li key={i} dangerouslySetInnerHTML={{__html: '• ' + rule}}></li>)}
                </ul>
              </div>
            </div>
            <button onClick={() => setShowRules(false)} className="w-full mt-6 py-3 bg-gradient-to-r from-green-500 to-yellow-500 text-gray-900 font-bold rounded-xl">{t.gotItBtn}</button>
          </div>
        </div>
      );

      if (gameState === 'setup') {
        const countryKeys = Object.keys(wordPacks);
        const countryData = wordPacks[selectedCountry];
        return (
          <div className="min-h-screen bg-gradient-to-br from-gray-900 via-green-900 to-gray-900 flex items-center justify-center p-4">
            <div className="bg-gray-800 rounded-3xl p-6 max-w-lg w-full shadow-2xl max-h-[95vh] overflow-y-auto">
              <div className="text-center mb-6">
                <div className="flex justify-between items-center mb-3">
                  <div className="relative">
                    <button onClick={() => setShowLangMenu(!showLangMenu)} className="text-gray-300 hover:text-yellow-400 text-sm flex items-center gap-1 bg-gray-700/50 px-3 py-1.5 rounded-lg transition-all">{translations[lang].flag} {translations[lang].name} ▾</button>
                    {showLangMenu && (
                      <div className="absolute top-11 left-0 bg-gray-700 rounded-xl shadow-xl z-50 overflow-hidden">
                        {langOptions.map(l => (
                          <button key={l} onClick={() => { changeLang(l); setShowLangMenu(false); }} className={`block w-full px-4 py-2 text-left text-sm hover:bg-gray-600 ${lang === l ? 'bg-yellow-400 text-gray-900' : 'text-gray-200'}`}>{translations[l].flag} {translations[l].name}</button>
                        ))}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setShowRules(true)} className="text-gray-300 hover:text-yellow-400 text-sm flex items-center gap-1 bg-gray-700/50 px-3 py-1.5 rounded-lg transition-all">📜 {t.rules}</button>
                </div>
                <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 via-yellow-400 to-green-400 mb-1">{t.title}</h1>
                <p className="text-lg text-yellow-400 mb-3">{t.subtitle}</p>
                <a href="https://buymeacoffee.com/pieterdevix" target="_blank" rel="noopener noreferrer" className="inline-block text-yellow-400 hover:bg-yellow-400 hover:text-gray-900 text-xs px-3 py-1.5 border border-yellow-400 rounded-lg transition-all">{t.support}</a>
              </div>
              {showRules && <RulesModal />}
              <div className="space-y-4 mb-6">
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => setSelectedCountry(lastTopicCountryRef.current || 'worldwide')} className={`py-3 px-2 rounded-xl font-bold transition-all text-center ${selectedCountry !== 'custom' ? 'bg-yellow-400 text-gray-900 scale-105' : 'bg-gray-600 text-gray-300 hover:bg-gray-500'}`}><span className="text-2xl block">📚</span><span className="text-sm block">Topic Words</span><span className="text-[10px] opacity-70">Pre-written packs</span></button>
                  <button onClick={() => setSelectedCountry('custom')} className={`py-3 px-2 rounded-xl font-bold transition-all text-center ${selectedCountry === 'custom' ? 'bg-yellow-400 text-gray-900 scale-105' : 'bg-gray-600 text-gray-300 hover:bg-gray-500'}`}><span className="text-2xl block">✏️</span><span className="text-sm block">Your Words</span><span className="text-[10px] opacity-70">Add your own</span></button>
                </div>
                {selectedCountry === 'custom' ? (
                  <div className="bg-gray-700/50 rounded-xl p-4">
                    <label className="text-white font-bold block mb-1">✏️ Your Words</label>
                    <p className="text-gray-400 text-xs mb-3">Pass the phone around. Each word is hidden once added — no one can see the list or who wrote what.</p>
                    <div className="flex gap-2">
                      <input
                        type="text"
                        value={wordInput}
                        onChange={(e) => { setWordInput(e.target.value); if (customNotice) setCustomNotice(''); }}
                        onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addCustomWord(); } }}
                        placeholder="Type a word, then Add"
                        autoFocus
                        className="flex-1 bg-gray-800 text-white rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-yellow-400 placeholder-gray-500"
                      />
                      <button onClick={addCustomWord} className="px-5 rounded-xl font-bold bg-yellow-400 text-gray-900 hover:bg-yellow-300 transition-all">Add</button>
                    </div>
                    {customNotice && <p className="text-amber-400 text-xs mt-2">{customNotice}</p>}
                    <p className="text-gray-400 text-xs mt-2">🔒 {customWords.length} word{customWords.length === 1 ? '' : 's'} in the pot{customWords.length < 2 ? ' — add at least 2 to play' : ''}</p>
                  </div>
                ) : (
                  <>
                    <div className="bg-gray-700/50 rounded-xl p-4">
                      <label className="text-white font-bold block mb-3">{t.chooseCountry}</label>
                      <div className="grid grid-cols-4 gap-2">{countryKeys.filter(key => key !== 'custom').map(key => (<button key={key} onClick={() => { setSelectedCountry(key); lastTopicCountryRef.current = key; }} className={`py-2 px-1 rounded-xl font-bold transition-all text-center ${selectedCountry === key ? 'bg-yellow-400 text-gray-900 scale-105' : 'bg-gray-600 text-gray-300 hover:bg-gray-500'}`}><span className="text-xl block">{wordPacks[key].flag}</span><span className="text-[10px]">{wordPacks[key].name}</span></button>))}</div>
                    </div>
                    <div className="bg-gray-700/50 rounded-xl p-4">
                      <label className="text-white font-bold block mb-3">{t.ageGroup}</label>
                      <div className="grid grid-cols-3 gap-2">{Object.keys(ageEmojis).map(key => (<button key={key} onClick={() => setAgeGroup(key)} className={`py-2 px-1 rounded-xl font-bold transition-all text-center ${ageGroup === key ? 'bg-yellow-400 text-gray-900 scale-105' : 'bg-gray-600 text-gray-300 hover:bg-gray-500'}`}><span className="text-lg block">{ageEmojis[key]}</span><span className="text-[10px] block">{t.ages[key].label}</span><span className="text-[8px] text-gray-400">{t.ages[key].range}</span></button>))}</div>
                    </div>
                  </>
                )}
                <div className="bg-gray-700/50 rounded-xl p-4">
                  <label className="text-white font-bold block mb-3">{t.teams}</label>
                  <div className="flex gap-2">{[2, 3, 4, 5, 6].map(n => (<button key={n} onClick={() => setNumTeams(n)} className={`flex-1 py-3 rounded-xl font-bold transition-all ${numTeams === n ? 'bg-yellow-400 text-gray-900' : 'bg-gray-600 text-gray-300 hover:bg-gray-500'}`}>{n}</button>))}</div>
                  <div className="flex justify-center gap-1 mt-3">{Array(numTeams).fill(0).map((_, i) => <span key={i} className="text-xl">{teamEmojis[i]}</span>)}</div>
                </div>
                {selectedCountry !== 'custom' && (
                <div className="bg-gray-700/50 rounded-xl p-4">
                  <label className="text-white font-bold block mb-3">{t.cards}</label>
                  <div className="flex gap-2">{getCardOptions().map(n => (<button key={n} onClick={() => setNumCards(n)} className={`flex-1 py-3 rounded-xl font-bold transition-all ${numCards === n ? 'bg-yellow-400 text-gray-900' : 'bg-gray-600 text-gray-300 hover:bg-gray-500'}`}>{n}</button>))}</div>
                </div>
                )}
                <div className="bg-gray-700/50 rounded-xl p-3"><div className="flex justify-around text-center">{[1, 2, 3].map(r => (<div key={r}><span className="text-2xl">{roundIcons[r]}</span><p className={`text-xs font-bold ${r === 1 ? 'text-blue-400' : r === 2 ? 'text-amber-400' : 'text-purple-400'}`}>{t.rounds[r].name}</p></div>))}</div></div>
              </div>
              {(() => { const customReady = selectedCountry !== 'custom' || customWords.length >= 2; return (
              <button onClick={startGame} disabled={!customReady} className={`w-full py-4 bg-gradient-to-r from-green-500 to-yellow-500 text-gray-900 font-black text-xl rounded-xl transition-all shadow-lg ${customReady ? 'hover:from-green-400 hover:to-yellow-400' : 'opacity-40 cursor-not-allowed'}`}>{t.startGame} {countryData.flag} {selectedCountry === 'custom' ? '' : ageEmojis[ageGroup]}</button>
              ); })()}
              <p className="text-gray-500 text-xs mt-4 mb-1 text-center">Try my other project</p>
              <a href="https://lovegraft.com" target="_blank" rel="noopener noreferrer" className="block opacity-70 hover:opacity-100 transition-opacity">
                <div className="bg-gray-700/30 rounded-xl p-4 flex items-center gap-5">
                  <div className="w-32 h-48 rounded-xl overflow-hidden flex-shrink-0 relative">
                    <div className="flex" style={{animation: 'scrollImages 12s infinite'}}>
                      <img src="Screenshot 2025-12-28 at 14.25.48.png" alt="Lovegraft" className="w-32 h-48 object-cover flex-shrink-0" />
                      <img src="Screenshot 2025-12-28 at 14.26.29.png" alt="Lovegraft" className="w-32 h-48 object-cover flex-shrink-0" />
                      <img src="Screenshot 2025-12-28 at 14.26.42.png" alt="Lovegraft" className="w-32 h-48 object-cover flex-shrink-0" />
                      <img src="Screenshot 2025-12-28 at 14.25.48.png" alt="Lovegraft" className="w-32 h-48 object-cover flex-shrink-0" />
                    </div>
                  </div>
                  <div className="flex-1">
                    <p className="text-gray-400 text-base mb-1">Analyse your relationship professionally</p>
                    <p className="text-gray-200 text-xl font-bold">lovegraft.com</p>
                  </div>
                </div>
              </a>
            </div>
          </div>
        );
      }

      if (gameState === 'between-rounds') {
        const leaders = getLeader();
        const minScore = Math.min(...scores);
        const lowestTeams = scores.reduce((acc, s, i) => { if (s === minScore) acc.push(i); return acc; }, []);
        const nextStartTeamPreview = lowestTeams.length === 1 ? lowestTeams[0] : null;
        return (
          <div className="min-h-screen bg-gradient-to-br from-gray-900 via-green-900 to-gray-900 flex items-center justify-center p-6">
            <div className="bg-gray-800 rounded-3xl p-8 max-w-lg w-full shadow-2xl text-center relative">
              <button onClick={resetGame} className="absolute top-4 left-4 bg-gray-700 hover:bg-gray-600 text-white text-sm px-3 py-1.5 rounded-lg font-medium transition-all">{t.exit}</button>
              <div className="text-6xl mb-4">🎉</div>
              <h2 className="text-3xl font-black text-white mb-2">{t.roundComplete.replace('{n}', round)}</h2>
              <div className="grid grid-cols-2 gap-3 my-6">{scores.map((score, idx) => (<div key={idx} className={`${teamColors[idx].bg} ${leaders?.includes(idx) ? 'ring-2 ' + teamColors[idx].ring : ''} rounded-xl p-3`}><p className={`${teamColors[idx].text} text-sm`}>{t.team} {idx + 1} {teamEmojis[idx]}</p><p className="text-3xl font-black text-white">{score}</p>{leaders?.includes(idx) && <p className="text-yellow-400 text-xs mt-1">{t.leading}</p>}</div>))}</div>
              <div className={`bg-gradient-to-r ${roundColors[round + 1]} rounded-xl p-4 mb-4`}><p className="text-white/80 text-sm">{t.nextUp}</p><p className="text-2xl font-black text-white">{roundIcons[round + 1]} {t.rounds[round + 1].name}</p><p className="text-white/80 text-sm mt-1">{t.rounds[round + 1].description}</p></div>
              <div className="bg-gray-700/50 rounded-xl p-3 mb-6"><p className="text-gray-300">{nextStartTeamPreview !== null ? `${teamEmojis[nextStartTeamPreview]} ${t.team} ${nextStartTeamPreview + 1} ${t.startsRound} ${round + 1}` : `${lowestTeams.map(i => teamEmojis[i]).join(' ')} ${t.tiedStart || 'Tied teams - random start'}`}</p></div>
              <button onClick={nextRound} className="w-full py-4 bg-gradient-to-r from-green-500 to-yellow-500 text-gray-900 font-black text-xl rounded-xl">{t.startRound} {round + 1} →</button>
            </div>
          </div>
        );
      }

      if (gameState === 'finished') {
        const winners = getWinner();
        return (
          <div className="min-h-screen bg-gradient-to-br from-gray-900 via-green-900 to-gray-900 flex items-center justify-center p-6">
            <div className="bg-gray-800 rounded-3xl p-8 max-w-lg w-full shadow-2xl text-center">
              <div className="text-6xl mb-4">🏆</div>
              <h2 className="text-3xl font-black text-white mb-2">{t.gameOver}</h2>
              <p className="text-2xl text-yellow-400 mb-6">{winners.length === 1 ? `${t.team} ${winners[0] + 1} ${t.wins} 🎉` : `${t.team}s ${winners.map(w => w + 1).join(' & ')} ${t.tie}`}</p>
              <div className="grid grid-cols-2 gap-3 my-6">{scores.map((score, idx) => (<div key={idx} className={`${winners.includes(idx) ? 'bg-yellow-500/30 ring-2 ring-yellow-400' : teamColors[idx].bg} rounded-xl p-3`}><p className={`${teamColors[idx].text} text-sm`}>{t.team} {idx + 1} {teamEmojis[idx]}</p><p className="text-4xl font-black text-white">{score}</p>{winners.includes(idx) && <p className="text-yellow-400 mt-1">🏆</p>}</div>))}</div>
              <button onClick={resetGame} className="w-full py-4 bg-gradient-to-r from-green-500 to-yellow-500 text-gray-900 font-black text-xl rounded-xl">{t.playAgain} 🔄</button>
            </div>
          </div>
        );
      }

      const cardsLeft = remainingWords.length + (currentWord ? 1 : 0);
      const countryData = wordPacks[selectedCountry];

      return (
        <div className={`min-h-screen bg-gradient-to-br ${teamColors[currentTeam].gradient} p-4 transition-colors duration-500`}>
          <div className="max-w-lg mx-auto">
            <div className="flex items-center justify-between mb-4">
              <button onClick={resetGame} className="bg-white/20 hover:bg-white/30 text-white text-sm px-3 py-1.5 rounded-lg font-medium transition-all">{t.exit}</button>
              <div className="text-center"><p className="text-white/60 text-xs">{t.round} {round} {countryData.flag} {ageEmojis[ageGroup]}</p><p className="text-white font-bold">{roundIcons[round]} {t.rounds[round].name}</p></div>
              <div className="text-white text-sm font-bold">{cardsLeft} {t.cardsLeft || 'cards left'}</div>
            </div>
            {showRules && <RulesModal />}
            <div className="grid grid-cols-2 gap-2 mb-4">{scores.map((score, idx) => (<div key={idx} className={`${currentTeam === idx ? 'ring-2 ring-white scale-105' : 'opacity-60'} ${teamColors[idx].bg} rounded-xl p-2 text-center transition-all`}><p className="text-white/60 text-xs">{currentTeam === idx && '▶ '}{t.team} {idx + 1} {teamEmojis[idx]}</p><p className="text-xl font-black text-white">{score}</p></div>))}</div>
            <div className="text-center mb-4">
              <div className={`inline-block text-8xl font-black tabular-nums ${isRunning && timer <= 10 ? 'text-red-200 animate-pulse' : 'text-white'}`}>{timer}</div>
              {isRunning && <p className="text-white/60 text-sm mt-1">✓ {turnCorrect.length} {t.thisTurn}</p>}
              {!isRunning && !showTurnSummary && <p className="text-white/60 text-sm mt-1">{t.seconds}</p>}
            </div>
            <div className="bg-white rounded-2xl p-6 shadow-2xl mb-4 min-h-[280px] flex flex-col items-center justify-center">
              {!isRunning && !showTurnSummary && (
                <div className="text-center">
                  <p className="text-2xl font-bold text-gray-800 mb-2">{teamEmojis[currentTeam]} {t.team} {currentTeam + 1}{t.teamsTurn}</p>
                  <p className="text-gray-500 mb-6">{t.rounds[round].description}</p>
                  <button onClick={startTurn} className={`px-10 py-5 bg-gradient-to-r ${roundColors[round]} text-white font-black text-2xl rounded-2xl shadow-lg active:scale-95 transition-transform`}>{t.go} 🚀</button>
                </div>
              )}
              {isRunning && currentWord && (
                <div className="text-center w-full">
                  <p className="text-4xl font-black text-gray-800 mb-8 leading-tight">{currentWord}</p>
                  <button onClick={markCorrect} className="w-full py-5 bg-green-500 hover:bg-green-400 active:bg-green-600 text-white font-bold text-xl rounded-xl transition-all mb-4">{t.gotIt} ✓</button>
                  <button onClick={stopTurn} className="w-full py-3 bg-red-100 hover:bg-red-200 text-red-600 font-bold rounded-xl transition-all">{t.stopTurn} ⏹️</button>
                </div>
              )}
              {showTurnSummary && (
                <div className="text-center w-full">
                  <p className="text-gray-500 mb-2">{t.turnOver}</p>
                  <p className="text-5xl font-black text-green-600 mb-2">{turnCorrect.length}</p>
                  <p className="text-gray-500 mb-4">{t.cardsFor} {t.team} {currentTeam + 1} {teamEmojis[currentTeam]}</p>
                  {turnCorrect.length > 0 && (
                    <div className="bg-green-50 border border-green-200 rounded-xl p-3 mb-4 max-h-32 overflow-y-auto">
                      <p className="text-green-600 text-xs mb-2">✓ {t.tapToRemove}</p>
                      <div className="flex flex-wrap gap-2 justify-center">{turnCorrect.map((word, i) => (<button key={i} onClick={() => { const newCorrect = turnCorrect.filter((_, idx) => idx !== i); setTurnCorrect(newCorrect); setScores(prev => { const n = [...prev]; n[currentTeam] -= 1; return n; }); setRemainingWords(prev => [...prev, word]); }} className="bg-green-100 active:bg-red-100 text-green-700 active:text-red-600 px-2 py-1 rounded text-sm transition-colors flex items-center gap-1">{word} <span className="text-red-400 text-xs">✕</span></button>))}</div>
                    </div>
                  )}
                  <button onClick={nextTeam} className={`w-full py-4 bg-gradient-to-r ${roundColors[round]} text-white font-black text-xl rounded-xl`}>{teamEmojis[(currentTeam + 1) % numTeams]} {t.team} {((currentTeam + 1) % numTeams) + 1}{t.nextTeam} →</button>
                </div>
              )}
            </div>
            <div className="bg-white/20 rounded-xl p-3 text-center"><p className="text-white font-medium">{t.rounds[round].description}</p></div>
            <button onClick={() => setShowRules(true)} className="w-full mt-3 py-3 bg-white/20 hover:bg-white/30 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2">📜 {t.rules}</button>
          </div>
        </div>
      );
    }
    // Load expanded words then render app
    loadExpandedWords().then(() => {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    });
  </script>
</body>
</html>
